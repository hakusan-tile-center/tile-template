<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地図タイル表示テスト</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body { height: 100%; margin: 0; }
  #map { width: 100%; height: 100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// ★ 地図の初期設定
const map = L.map('map', {
  center: [35.0, 137.0],
  zoom: 12,
  minZoom: 5,
  maxZoom: 18
});

// ★ GitHub Pages 用のフルURL ＋ flipY=true（最重要）
L.tileLayer('https://hakusan-tile-center.github.io/tile-template/katahira/tiles/{z}/{x}/{y}.png?flipY=true', {
  minZoom: 5,
  maxZoom: 18,
  tms: true,
  attribution: '© Your Tiles'
}).addTo(map);
</script>

</body>
</html>
