<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Tiles Viewer</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>

  <!-- Leaflet 読み込み -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>
</head>

<body>
  <div id="map"></div>

  <script>
    // 地図の初期位置（適当に白山周辺）
    const map = L.map('map').setView([36.25, 136.77], 13);

    // あなたのタイルを読み込む
    L.tileLayer('./tiles/{z}/{x}/{y}.png', {
      maxZoom: 19,
      minZoom: 0,
      attribution: '© hakusan-tile-center'
    }).addTo(map);
  </script>
</body>
</html>
